<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ML Academy — Corso interattivo di Machine Learning</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <h1>ML Academy</h1>
      <p class="subtitle">Corso interattivo</p>
    </div>
    <div id="progress-summary">
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <div class="progress-text"><span id="progress-count">0</span> / <span id="progress-total">0</span> lezioni</div>
    </div>
    <nav id="lesson-list"></nav>
    <div class="sidebar-footer">
      <button id="reset-progress" title="Azzera i progressi salvati">Reset progressi</button>
      <div id="pyodide-status">Python: <span id="pyodide-state">non caricato</span></div>
    </div>
  </aside>

  <main id="content">
    <header id="lesson-header">
      <div class="breadcrumb"><span id="lesson-index"></span></div>
      <h2 id="lesson-title">Benvenuto</h2>
      <p id="lesson-summary"></p>
      <div class="tabs">
        <button class="tab-btn active" data-tab="teoria">Teoria</button>
        <button class="tab-btn" data-tab="esempi">Esempi</button>
        <button class="tab-btn" data-tab="esercizi">Esercizi</button>
        <button class="tab-btn" data-tab="test">Test finale</button>
      </div>
    </header>

    <section id="tab-teoria" class="tab-panel active"></section>
    <section id="tab-esempi" class="tab-panel"></section>
    <section id="tab-esercizi" class="tab-panel"></section>
    <section id="tab-test" class="tab-panel"></section>

    <footer id="lesson-nav">
      <button id="prev-lesson">&larr; Lezione precedente</button>
      <button id="mark-complete">Segna come completata</button>
      <button id="next-lesson">Prossima lezione &rarr;</button>
    </footer>
  </main>
</div>

<script src="lessons.js"></script>
<script src="app.js"></script>
</body>
</html>
